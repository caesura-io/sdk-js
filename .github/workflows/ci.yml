name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ai-version: ['5', '6', '7']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Override the AI SDK major for this leg and re-typecheck/test.
      - run: pnpm --filter @caesura-io/ai-sdk add -D ai@${{ matrix.ai-version }}
      - run: pnpm lint
      # Build before typecheck — downstream packages (ai-sdk, openai) resolve
      # @caesura-io/core via its "types" export (dist/index.d.ts), which only
      # exists after the build step.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
